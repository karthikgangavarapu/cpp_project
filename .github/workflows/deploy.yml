name: MenuMix — Build, Test & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  TABLE_NAME: menumix-prod
  LAMBDA_NAME: menumix-api
  ROLE_NAME: menumix-lambda-role
  API_NAME: menumix-api
  S3_FRONTEND_BUCKET: menumix-frontend-karthik-2026
  S3_AUDIO_BUCKET: menumix-audio-karthik-2026

jobs:
  # ---------------------------------------------------------------------
  # 1. Library tests
  # ---------------------------------------------------------------------
  test-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install + test menu-translator-nci
        run: |
          cd library
          pip install -e .
          pip install pytest
          pytest tests/ -v

  # ---------------------------------------------------------------------
  # 2. Backend deploy: DynamoDB, IAM, Lambda, API Gateway, seed
  # ---------------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: test-library
    outputs:
      api_url: ${{ steps.api.outputs.api_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create DynamoDB table (idempotent)
        run: |
          aws dynamodb describe-table --table-name ${{ env.TABLE_NAME }} --region ${{ env.AWS_REGION }} 2>/dev/null && echo "Table exists" || \
          aws dynamodb create-table \
            --table-name ${{ env.TABLE_NAME }} \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region ${{ env.AWS_REGION }}
          aws dynamodb wait table-exists --table-name ${{ env.TABLE_NAME }} --region ${{ env.AWS_REGION }}

      - name: Create S3 audio bucket for Polly (idempotent)
        run: |
          aws s3api head-bucket --bucket ${{ env.S3_AUDIO_BUCKET }} 2>/dev/null || \
          aws s3api create-bucket \
            --bucket ${{ env.S3_AUDIO_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

      - name: Create Lambda IAM role (idempotent)
        run: |
          aws iam get-role --role-name ${{ env.ROLE_NAME }} 2>/dev/null && echo "Role exists" || \
          aws iam create-role \
            --role-name ${{ env.ROLE_NAME }} \
            --assume-role-policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": "lambda.amazonaws.com"},
                "Action": "sts:AssumeRole"
              }]
            }'

          aws iam attach-role-policy --role-name ${{ env.ROLE_NAME }} --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole 2>/dev/null || true
          aws iam attach-role-policy --role-name ${{ env.ROLE_NAME }} --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess 2>/dev/null || true
          aws iam attach-role-policy --role-name ${{ env.ROLE_NAME }} --policy-arn arn:aws:iam::aws:policy/AmazonS3FullAccess 2>/dev/null || true
          aws iam attach-role-policy --role-name ${{ env.ROLE_NAME }} --policy-arn arn:aws:iam::aws:policy/TranslateFullAccess 2>/dev/null || true
          aws iam attach-role-policy --role-name ${{ env.ROLE_NAME }} --policy-arn arn:aws:iam::aws:policy/AmazonPollyFullAccess 2>/dev/null || true

          # Wait for role propagation
          sleep 10

      - name: Package Lambda (code + library)
        run: |
          mkdir -p package
          cp backend/lambda_function.py package/
          cp -r library/menu_translator package/
          cd package && zip -r ../lambda.zip . && cd ..
          ls -la lambda.zip

      - name: Create or update Lambda
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${{ env.ROLE_NAME }}"
          ENV_VARS="Variables={DYNAMODB_TABLE=${{ env.TABLE_NAME }},S3_AUDIO_BUCKET=${{ env.S3_AUDIO_BUCKET }},REGION=${{ env.AWS_REGION }},JWT_SECRET=menumix-karthik-2026}"

          if aws lambda get-function --function-name ${{ env.LAMBDA_NAME }} --region ${{ env.AWS_REGION }} 2>/dev/null; then
            aws lambda update-function-code \
              --function-name ${{ env.LAMBDA_NAME }} \
              --zip-file fileb://lambda.zip \
              --region ${{ env.AWS_REGION }}
            aws lambda wait function-updated --function-name ${{ env.LAMBDA_NAME }} --region ${{ env.AWS_REGION }}
            aws lambda update-function-configuration \
              --function-name ${{ env.LAMBDA_NAME }} \
              --environment "$ENV_VARS" \
              --region ${{ env.AWS_REGION }}
          else
            aws lambda create-function \
              --function-name ${{ env.LAMBDA_NAME }} \
              --runtime python3.11 \
              --role $ROLE_ARN \
              --handler lambda_function.lambda_handler \
              --zip-file fileb://lambda.zip \
              --timeout 30 \
              --memory-size 256 \
              --environment "$ENV_VARS" \
              --region ${{ env.AWS_REGION }}
          fi

      - name: Create or get API Gateway REST API
        id: api
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='${{ env.API_NAME }}'].id" --output text --region ${{ env.AWS_REGION }})
          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            API_ID=$(aws apigateway create-rest-api --name ${{ env.API_NAME }} --endpoint-configuration types=REGIONAL --query 'id' --output text --region ${{ env.AWS_REGION }})
          fi

          ROOT_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?path=='/'].id" --output text --region ${{ env.AWS_REGION }})

          PROXY_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?pathPart=='{proxy+}'].id" --output text --region ${{ env.AWS_REGION }})
          if [ -z "$PROXY_ID" ] || [ "$PROXY_ID" = "None" ]; then
            PROXY_ID=$(aws apigateway create-resource --rest-api-id $API_ID --parent-id $ROOT_ID --path-part '{proxy+}' --query 'id' --output text --region ${{ env.AWS_REGION }})
          fi

          LAMBDA_ARN="arn:aws:lambda:${{ env.AWS_REGION }}:${ACCOUNT_ID}:function:${{ env.LAMBDA_NAME }}"

          # ANY on {proxy+}
          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --authorization-type NONE --request-parameters "method.request.path.proxy=true" --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "arn:aws:apigateway:${{ env.AWS_REGION }}:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations" --region ${{ env.AWS_REGION }}

          # OPTIONS for CORS preflight
          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --authorization-type NONE --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws apigateway put-method-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters "method.response.header.Access-Control-Allow-Headers=true,method.response.header.Access-Control-Allow-Methods=true,method.response.header.Access-Control-Allow-Origin=true" --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --type MOCK --request-templates '{"application/json": "{\"statusCode\": 200}"}' --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws apigateway put-integration-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters '{"method.response.header.Access-Control-Allow-Headers":"'"'"'Content-Type,Authorization'"'"'","method.response.header.Access-Control-Allow-Methods":"'"'"'GET,POST,PUT,DELETE,OPTIONS'"'"'","method.response.header.Access-Control-Allow-Origin":"'"'"'*'"'"'"}' --region ${{ env.AWS_REGION }} 2>/dev/null || true

          # ANY on root
          aws apigateway put-method --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --authorization-type NONE --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "arn:aws:apigateway:${{ env.AWS_REGION }}:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations" --region ${{ env.AWS_REGION }} 2>/dev/null || true

          # Lambda invoke permission
          aws lambda add-permission \
            --function-name ${{ env.LAMBDA_NAME }} \
            --statement-id apigateway-invoke-v1 \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:${{ env.AWS_REGION }}:${ACCOUNT_ID}:${API_ID}/*" \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

          aws apigateway create-deployment --rest-api-id $API_ID --stage-name prod --region ${{ env.AWS_REGION }}
          API_URL="https://${API_ID}.execute-api.${{ env.AWS_REGION }}.amazonaws.com/prod"
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Seed initial data
        run: |
          pip install boto3
          export DYNAMODB_TABLE=${{ env.TABLE_NAME }}
          export REGION=${{ env.AWS_REGION }}
          python backend/seed.py

  # ---------------------------------------------------------------------
  # 3. Frontend deploy: S3 static website
  # ---------------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build frontend
        run: |
          cd frontend
          rm -rf node_modules package-lock.json
          npm install --force
          VITE_API_URL=${{ needs.deploy-backend.outputs.api_url }} npm run build
          ls -la dist

      - name: Create + configure S3 frontend bucket
        run: |
          aws s3api head-bucket --bucket ${{ env.S3_FRONTEND_BUCKET }} 2>/dev/null || \
          aws s3api create-bucket \
            --bucket ${{ env.S3_FRONTEND_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

          aws s3api put-public-access-block \
            --bucket ${{ env.S3_FRONTEND_BUCKET }} \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false" \
            --region ${{ env.AWS_REGION }}

          aws s3api put-bucket-policy --bucket ${{ env.S3_FRONTEND_BUCKET }} --region ${{ env.AWS_REGION }} --policy '{
            "Version": "2012-10-17",
            "Statement": [{"Sid": "PublicRead", "Effect": "Allow", "Principal": "*", "Action": "s3:GetObject", "Resource": "arn:aws:s3:::${{ env.S3_FRONTEND_BUCKET }}/*"}]
          }'

          aws s3api put-bucket-website --bucket ${{ env.S3_FRONTEND_BUCKET }} --region ${{ env.AWS_REGION }} --website-configuration '{
            "IndexDocument": {"Suffix": "index.html"},
            "ErrorDocument": {"Key": "index.html"}
          }'

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.S3_FRONTEND_BUCKET }} --delete --region ${{ env.AWS_REGION }}

          # SPA fallback: upload index.html copies for named routes so direct
          # deep-links return HTTP 200 instead of S3's default 404.
          for route in login register admin restaurants; do
            aws s3 cp frontend/dist/index.html s3://${{ env.S3_FRONTEND_BUCKET }}/$route \
              --content-type "text/html" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --region ${{ env.AWS_REGION }}
          done

      - name: Output URLs
        run: |
          echo "========================================"
          echo "Frontend: http://${{ env.S3_FRONTEND_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
          echo "API:      ${{ needs.deploy-backend.outputs.api_url }}"
          echo "========================================"
